name: .NET CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build src/ArchSql/ArchSql.csproj

      - name: Test
        run: dotnet test tests/ArchSql.Tests/ArchSql.Tests.csproj
